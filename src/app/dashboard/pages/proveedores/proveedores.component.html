<!-- ===================== MODALES ===================== -->
<app-crear-proveedor
  *ngIf="mostrarCrear"
  (cancelar)="cancelarCrear()"
  (proveedorCreado)="onProveedorCreado()">
</app-crear-proveedor>

<app-editar-proveedor
  *ngIf="mostrarEditar && proveedorEnEdicion"
  [proveedor]="proveedorEnEdicion"
  (cancelar)="cancelarEditar()"
  (proveedorActualizado)="onProveedorActualizado($event)">
</app-editar-proveedor>

<!-- ===================== HEADER ===================== -->
<div *ngIf="!mostrarCrear && !mostrarEditar" class="proveedores-header">
  <h2>Gestión de Proveedores</h2>
  <button class="btn-crear-principal" (click)="abrirCrear()">
    <i class="fa-solid fa-plus"></i>
    Crear Nuevo Proveedor
  </button>
</div>

<!-- ===================== LISTA DE PROVEEDORES ===================== -->
<div *ngIf="!mostrarCrear && !mostrarEditar" class="proveedores-container">
  <!-- Búsqueda -->
  <div class="search-section">
    <input
      [(ngModel)]="search"
      (ngModelChange)="filter()"
      placeholder="Buscar proveedor..."
      class="search-input"
    />
  </div>

  <!-- Mensaje cuando no hay proveedores -->
  <div *ngIf="proveedores.length === 0" class="no-proveedores">
    <div class="no-proveedores-content">
      <i class="fa-solid fa-truck"></i>
      <h3>No hay proveedores registrados</h3>
      <p>Comienza agregando tu primer proveedor</p>
    </div>
  </div>



  <!-- Lista de proveedores existentes -->
  <div *ngIf="proveedores.length > 0" class="proveedores-lista">
    <div *ngFor="let supplier of proveedores" class="proveedor-item">
      <div class="proveedor-info">
        <div class="proveedor-header">
          <h3>{{ supplier.name }}</h3>
          <span class="proveedor-id">ID: {{ supplier.id }}</span>
        </div>
        <div class="proveedor-details">
          <div class="detail-row" *ngIf="supplier.email">
            <span class="detail-label">
              <i class="fa-solid fa-envelope"></i> Email:
            </span>
            <span class="detail-value">{{ supplier.email }}</span>
          </div>
          <div class="detail-row" *ngIf="supplier.phone">
            <span class="detail-label">
              <i class="fa-solid fa-phone"></i> Teléfono:
            </span>
            <span class="detail-value">{{ supplier.phone }}</span>
          </div>
          <div class="detail-row" *ngIf="supplier.address">
            <span class="detail-label">
              <i class="fa-solid fa-map-marker-alt"></i> Dirección:
            </span>
            <span class="detail-value">{{ supplier.address }}</span>
          </div>
        </div>
      </div>

      <!-- Botones de acciones de proveedor -->
      <div class="acciones">
        <button class="btn ver" (click)="verProductos(supplier)" title="Ver productos">
          <i class="fa-solid fa-eye"></i>
          <span>Productos</span>
        </button>
        <button class="btn actualizar" (click)="abrirEditar(supplier)" title="Editar proveedor">
          <i class="fa-solid fa-edit"></i>
          <span>Editar</span>
        </button>
        <button class="btn eliminar" (click)="eliminarProveedor(supplier)" title="Eliminar proveedor">
          <i class="fa-solid fa-trash"></i>
          <span>Eliminar</span>
        </button>
      </div>
    </div> <!-- Fin proveedor-item -->
  </div> <!-- Fin proveedores-lista -->
</div> <!-- Fin proveedores-container -->

<!-- ===================== PANEL DE PRODUCTOS (COMPONENTE HIJO) ===================== -->
<app-product-suppliers
  *ngIf="proveedorSeleccionado"
  [proveedorId]="proveedorSeleccionado.id"
  [proveedorSeleccionado]="proveedorSeleccionado"
  [productos]="todosLosProductos"
  [modoModal]="true"
  [autoAbrir]="true"
  (cerrar)="proveedorSeleccionado = undefined"
  (productoEliminado)="eliminarProductoDelProveedor($event)">
</app-product-suppliers>

<!-- ===================== MODAL PARA ASOCIAR PRODUCTO ===================== -->
<app-asociar-producto
  *ngIf="mostrarAsociar"
  [proveedor]="proveedorSeleccionado"
  [productos]="todosLosProductos"
  (asociado)="asociarProductoDesdeModal($event)"
  (cancelar)="cancelarAsociar()">
</app-asociar-producto>
