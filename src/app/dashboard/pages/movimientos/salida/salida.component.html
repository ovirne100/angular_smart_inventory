<div class="salida-container">

  <div class="header">
    <h2>📤 Salidas de Productos</h2>
    <button (click)="toggleForm()" class="btn-toggle">
      {{ showForm ? '✖ Cerrar' : '➕ Nueva Salida' }}
    </button>
  </div>

  <div class="messages">
    <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
    <div *ngIf="warningMessage" class="alert warning">{{ warningMessage }}</div>
  </div>

  <form *ngIf="showForm" [formGroup]="salidaForm" (ngSubmit)="onSubmit()" class="form-box" novalidate>
    <h3>Registrar Nueva Salida</h3>

    <div class="form-group">
      <label>Producto *</label>
      <select formControlName="product_id">
        <option value="">Seleccione un producto</option>
        <option *ngFor="let p of productos" [value]="p.id">{{ p.name }}</option>
      </select>
      <div class="error" *ngIf="salidaForm.controls['product_id'].invalid && salidaForm.controls['product_id'].touched">
        Selecciona un producto.
      </div>
    </div>

    <div class="form-group">
      <label>Cantidad *</label>
      <input type="number" formControlName="quantity" placeholder="Ej: 10" min="1">
      <div class="error" *ngIf="salidaForm.controls['quantity'].invalid && salidaForm.controls['quantity'].touched">
        Ingresa una cantidad válida (≥1).
      </div>
    </div>

    <div class="form-group">
      <label>Unidad</label>
      <input type="text" formControlName="unit" placeholder="unidad, caja, paquete...">
    </div>

    <div class="form-group">
      <label>Lote / Motivo</label>
      <input type="text" formControlName="lot" placeholder="Ej: venta, traslado, L-2025-A...">
      <small class="form-hint">Si no se especifica lote, se buscará inventario automáticamente (FIFO).</small>
    </div>

    <button type="submit" class="btn-submit" [disabled]="saving || salidaForm.invalid">
      {{ saving ? 'Guardando...' : '✅ Guardar Salida' }}
    </button>
  </form>
</div>
